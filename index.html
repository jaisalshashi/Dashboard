<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:#0b0b12;
  color:#fff;
  padding:20px;
}

h2{
  text-align:center;
  margin-bottom:20px;
  font-weight:600;
}

/* card */
.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  padding:16px;
  margin-bottom:14px;
  backdrop-filter:blur(10px);
}

/* text */
.msgText{
  margin-bottom:12px;
  line-height:1.5;
}

/* button */
.storyBtn{
  padding:8px 14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#ff006e,#8338ec);
  color:white;
  cursor:pointer;
}

/* story card */
#storyCard{
  position:absolute;
  left:-9999px;
  width:360px;
  height:640px;
  padding:30px;
  border-radius:25px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:#fff;
}

/* text inside story */
#storyText{
  font-size:22px;
  line-height:1.5;
  text-shadow:0 0 15px rgba(255,255,255,0.4);
  word-break:break-word;
}

.brand{
  position:absolute;
  bottom:20px;
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<h2>📩 Your Messages</h2>
<div id="list"></div>

<!-- 🔥 hidden story -->
<div id="storyCard" style="
position:absolute;
left:-9999px;
width:360px;
height:640px;
padding:30px;
border-radius:30px;
background: radial-gradient(circle at top, #1a1a2e, #0b0b12 70%);
color:#fff;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
">

  <!-- subtle glow layer -->
  <div style="
    position:absolute;
    width:200%;
    height:200%;
    background:radial-gradient(circle, rgba(255,255,255,0.08), transparent 60%);
    top:-50%;
    left:-50%;
    filter:blur(80px);
  "></div>

  <h2 style="
    margin-bottom:20px;
    font-weight:600;
    letter-spacing:0.5px;
  ">
    Someone sent me 💀
  </h2>

  <p id="storyText" style="
    font-size:22px;
    line-height:1.5;
    font-weight:500;
    text-shadow:0 0 20px rgba(255,255,255,0.25);
    word-break:break-word;
    z-index:1;
  "></p>

  <!-- premium watermark -->
  <div style="
    position:absolute;
    bottom:20px;
    font-size:13px;
    opacity:0.6;
    letter-spacing:1px;
  ">
    $uraj
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA-pnVuIAGKqFq3zDUL3ekzDKim50WweaA",
  authDomain: "ngll-32e53.firebaseapp.com",
  projectId: "ngll-32e53"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadMsg(){

  const q = query(collection(db,"messages"), orderBy("time","desc"));
  const snap = await getDocs(q);

  let list = document.getElementById("list");

  if(snap.empty){
    list.innerHTML = "<p style='opacity:.6;text-align:center'>No messages 😴</p>";
    return;
  }

  snap.forEach(doc=>{
    let div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <div class="msgText">${doc.data().text}</div>
      <button class="storyBtn">Share Story 📲</button>
    `;

    list.appendChild(div);
  });

  attachStory();
}

loadMsg();

/* gradients */
const gradients = [
  "linear-gradient(135deg,#ff006e,#8338ec)",
  "linear-gradient(135deg,#00c6ff,#0072ff)",
  "linear-gradient(135deg,#1f4037,#99f2c8)",
  "linear-gradient(135deg,#ff9a9e,#fad0c4)"
];

/* story function */
function attachStory(){

  document.querySelectorAll(".storyBtn").forEach(btn=>{

    btn.addEventListener("click",()=>{

      let text = btn.parentElement.querySelector(".msgText").innerText;

      document.getElementById("storyText").innerText = text;

      document.getElementById("storyCard").style.background =
        gradients[Math.floor(Math.random()*gradients.length)];

      if(typeof html2canvas === "undefined"){
        alert("Story load nahi hui 😅");
        return;
      }

      html2canvas(document.getElementById("storyCard"),{scale:2}).then(canvas=>{
        let link=document.createElement("a");
        link.download="story.png";
        link.href=canvas.toDataURL();
        link.click();
      });

    });

  });

}

</script>

</body>
</html>
