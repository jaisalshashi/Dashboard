<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:#0b0b12;
  color:white;
  font-family:sans-serif;
  padding:20px;
}

h2{
  text-align:center;
  margin-bottom:20px;
}

.card{
  background:#1a1a25;
  padding:15px;
  margin-bottom:12px;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>📩 Your Messages</h2>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyA-pnVuIAGKqFq3zDUL3ekzDKim50WweaA",
  authDomain: "ngll-32e53.firebaseapp.com",
  projectId: "ngll-32e53"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ⚠️ SAME username jo send page me use hua
const username = "suraj";

async function loadMsg(){

  try{

    const q = query(
      collection(db, "users", username, "messages"),
      orderBy("time", "desc")
    );

    const snap = await getDocs(q);

    console.log("Messages:", snap.size);

    let list = document.getElementById("list");

    if(snap.empty){
      list.innerHTML = "<p>No messages yet 😴</p>";
      return;
    }

    snap.forEach(doc=>{
      let div = document.createElement("div");
      div.className = "card";
      div.innerText = doc.data().text;
      list.appendChild(div);
    });

  }catch(e){
    console.error("Error:", e);
    alert("Error: " + e.message);
  }

}

loadMsg();

</script>

</body>
</html>
