<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{background:#111;color:white;font-family:sans-serif;padding:20px;}
.card{background:#222;padding:15px;margin-bottom:10px;border-radius:10px;}
</style>
</head>

<body>

<h2>📩 Messages</h2>
<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA-pnVuIAGKqFq3zDUL3ekzDKim50WweaA",
  authDomain: "ngll-32e53.firebaseapp.com",
  projectId: "ngll-32e53"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadMsg(){

  const q = query(
    collection(db, "messages"),
    orderBy("time","desc")
  );

  const snap = await getDocs(q);

  console.log("Docs:", snap.size);

  let list = document.getElementById("list");

  if(snap.empty){
    list.innerHTML = "<p>No messages 😴</p>";
    return;
  }

  snap.forEach(doc=>{
    let div = document.createElement("div");
    div.className="card";
    div.innerText = doc.data().text;
    list.appendChild(div);
  });

}

loadMsg();

</script>

</body>
</html>
