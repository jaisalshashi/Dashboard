<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:#0b0b12;
  color:white;
  padding:20px;
}

h2{
  text-align:center;
  margin-bottom:20px;
}

/* message card */
.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;
  padding:16px;
  margin-bottom:14px;
}

.msgText{
  margin-bottom:12px;
  line-height:1.5;
}

/* buttons */
.btn{
  padding:8px 12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-right:8px;
  font-weight:500;
}

.storyBtn{
  background:#ff006e;
  color:#fff;
}

/* hidden story card */
#storyCard{
  position:absolute;
  left:-9999px;
  width:360px;
  height:640px;
  border-radius:25px;
  padding:30px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:#fff;
}

/* text style */
#storyText{
  font-size:20px;
  line-height:1.5;
  font-weight:500;
  text-shadow:0 0 10px rgba(255,255,255,0.4);
  word-break:break-word;
}

.brand{
  position:absolute;
  bottom:20px;
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<h2>📩 Your Messages</h2>
<div id="list"></div>

<!-- 🔥 STORY CARD -->
<div id="storyCard">
  <h2 style="margin-bottom:20px;">Someone sent me 👀</h2>
  <p id="storyText"></p>
  <div class="brand">yoursite.com</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ⚠️ SAME username as send page */
const username = "suraj";

async function loadMsg(){

  const q = query(
    collection(db,"users",username,"messages"),
    orderBy("time","desc")
  );

  const snap = await getDocs(q);
  const list = document.getElementById("list");

  if(snap.empty){
    list.innerHTML = "<p style='opacity:.6;text-align:center'>No messages yet 😴</p>";
    return;
  }

  snap.forEach(doc=>{
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="msgText">${doc.data().text}</div>
      <button class="btn storyBtn">Story 📲</button>
    `;

    list.appendChild(div);
  });

  attachStoryEvents();
}

loadMsg();

/* 🎨 gradient list */
const gradients = [
  "linear-gradient(135deg,#ff6a00,#ee0979)",
  "linear-gradient(135deg,#00c6ff,#0072ff)",
  "linear-gradient(135deg,#1f4037,#99f2c8)",
  "linear-gradient(135deg,#8e2de2,#4a00e0)",
  "linear-gradient(135deg,#ff9a9e,#fad0c4)"
];

/* 🔥 story generator */
function attachStoryEvents(){

  document.querySelectorAll(".storyBtn").forEach(btn=>{

    btn.addEventListener("click",()=>{

      const text = btn.parentElement.querySelector(".msgText").innerText;

      document.getElementById("storyText").innerText = text;

      /* random gradient */
      const g = gradients[Math.floor(Math.random()*gradients.length)];
      document.getElementById("storyCard").style.background = g;

      /* SAFE html2canvas */
      if(typeof html2canvas === "undefined"){
        alert("Story feature load nahi hua 😅");
        return;
      }

      html2canvas(document.getElementById("storyCard"),{
        scale:2 /* high quality */
      }).then(canvas=>{
        const link = document.createElement("a");
        link.download = "story.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      });

    });

  });
}

</script>

</body>
</html>
